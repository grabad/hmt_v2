name: hmt_smlm
channels:
  - conda-forge

dependencies:
  - python=3.11

  # core science
  - numpy=2.1.3
  - scipy=1.14.1
  - numba=0.60.0
  - scikit-learn=1.6.1
  - hdbscan=0.8.42
  - lmfit=1.3.2

  # visualization
  - matplotlib=3.9.2
  - napari=0.5.6
  - magicgui=0.10.1

  # SMLM analysis
  - locan=0.21.0

  # data
  - pandas=2.2.3
  - dask=2026.3.0
  - imageio=2.37.0
  - imagecodecs=2026.3.6

  # optional geo stack
  - geopandas=1.1.3
  - folium=0.20.0
  - esda=2.9.0
  - mapclassify=2.8.1

  # notebooks
  - jupyterlab=4.5.6
  - ipykernel=6.31.0
  - ipywidgets=8.1.8
  - nbstripout=0.7.1